services:
  db:
    image: mariadb:11
    container_name: calculator-db
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: calc_data
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-root", "-root123"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    container_name: calculator-app
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data: