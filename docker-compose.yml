version: '3.8'

services:
  db:
    image: mariadb:11
    container_name: calculator-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Test12
      MYSQL_DATABASE: calc_data
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  app:
    image: thanh0201/sum-product_fx:latest
    container_name: calculator-app
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: Test12
      DISPLAY: host.docker.internal:0
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
    network_mode: bridge

volumes:
  db_data:
